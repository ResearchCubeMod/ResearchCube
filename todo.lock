Design Decisions (need resolution before implementation)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

- [RESOLVED] Completed research scope: implemented as per-player via ResearchSavedData (SavedData). Each player UUID has their own Set<ResourceLocation> of completed research.

- [DECISION] Drive reusability: should a drive be consumable on recipe craft (current behaviour — drive is consumed by DriveCraftingRecipe) or should it persist with the recipe removed from its NBT? Consuming is simpler but makes drives feel disposable at high tier.

- [DECISION] Research failure / risk: should IRRECOVERABLE-tier research have a chance to corrupt/consume the drive on failure? Would add risk/reward but needs a RNG check hook in completeResearch().

- [DECISION] [MAJOR] Multi-player research sharing: should completed research be shared across all players on a server (single SavedData map) or isolated per-player? Affects SavedData design significantly.

- [DECISION] [MAJOR] Multi-tier Research Stations: if different station tiers are added (Basic / Advanced Station), significant changes to block registration, TierUtil, and recipes are needed — requires design approval before any implementation.


PHASE 13 — Shaped Drive Crafting Support
(The drive_crafting recipe type only supports shapeless matching today.
Adding shaped support lets pack authors specify exact crafting grid layouts.)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

- [AI] DriveCraftingRecipe: add optional shaped mode
  Extend DriveCraftingRecipe with an optional "pattern" (3-element string array) and
  "key" (map of single char → ingredient) field mirroring vanilla shaped recipes.
  When "pattern" is present the recipe is shaped; when absent it behaves as today (shapeless).
  Add a boolean `isShaped` flag and a separate `matchesShaped()` path in matches().
  The drive can appear inside the pattern (use a special marker character, e.g. 'D') or
  outside it (auto-detected from remaining grid slots as before).

  Example shaped JSON:
  {
    "type": "researchcube:drive_crafting",
    "recipe_id": "researchcube:basic_circuit_recipe_1",
    "pattern": ["RR ", "II ", "   "],
    "key": {
      "R": { "item": "minecraft:redstone" },
      "I": { "item": "minecraft:iron_ingot" }
    },
    "result": { "id": "minecraft:repeater", "count": 4 }
  }

- [AI] DriveCraftingRecipeSerializer: parse shaped fields
  Update DriveCraftingRecipeSerializer MapCodec and StreamCodec to handle the optional
  "pattern" / "key" fields. Deserialize into a ShapedRecipePattern (reuse vanilla's
  ShapedRecipePattern codec) stored on the recipe. Serializer must round-trip correctly
  for both shaped and shapeless variants.

- [AI] DriveCraftingTableMenu: respect shaped mode
  DriveCraftingTableMenu's live recipe matching loop checks all recipes for matches.
  Ensure the 3×3 grid CraftingInput is passed directly so that shaped recipes work
  (position matters). Shapeless recipes should continue to work unchanged.

- [AI] JEI drive crafting category: shaped layout
  When a DriveCraftingRecipe is shaped, render the ingredients in DriveCraftingCategory
  using a 3×3 slot grid (like vanilla shaped JEI categories) rather than the current
  flat 4×2 row. Auto-detect shaped vs shapeless from the recipe and switch layout.

